<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- CSS link -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="">
        <div class="nav-left">
            <div class="logo">
                <img src="png/SnowyieSocy.png" alt="">
                <h1>Snowyie</h1>
            </div>

            <div class="vertical-line"></div>

            <ul class="navigation">
                <li><a href="#">Home</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Projetos</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <div class="search">
                <i class="search-icon fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search..." class="search-box">
            </div>
            <div class="menu">
                <i class="h-icon fa-solid fa-bars"></i>
                <i class="h-exit fa-solid fa-xmark"></i>
            </div>
        </div>
    </nav>

    <div class="hero">
        <video class="video-bg" autoplay muted loop>
            <source src="mp4/main.mp4" type="video/webm">
        </video>
        <h1>SNOWYIE</h1>
    </div>
    
    <script>
        let nav = document.querySelector('nav')
        let menuToggle = document.querySelector('.menu')

        // Abrir/Fechar Menu Hamburger
        menuToggle.onclick = function(){
            nav.classList.toggle('open');
        };

        // Transparencia da Navbar quando Scrollar pra baixo
        window.addEventListener('scroll', () => {
        if (window.scrollY >= 80) {
            nav.classList.add('scrolled');
        } else if (window.scrollY < 80) {
            nav.classList.remove('scrolled');
        }
    });
    </script>
</body>
</html>
